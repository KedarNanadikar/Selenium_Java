name: Selenium Java Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
        java-version: [11, 17, 21]
      fail-fast: false

    name: Test on Java ${{ matrix.java-version }} with ${{ matrix.browser }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Install Chrome
      if: matrix.browser == 'chrome'
      uses: browser-actions/setup-chrome@v1

    - name: Install Firefox
      if: matrix.browser == 'firefox'
      uses: browser-actions/setup-firefox@v1

    - name: Install Edge
      if: matrix.browser == 'edge'
      uses: browser-actions/setup-edge@v1

    - name: Compile project
      run: mvn clean compile

    - name: Run Smoke Tests
      run: mvn test -Dbrowser=${{ matrix.browser }} -Dgroups=smoke -Dheadless=true
      continue-on-error: true

    - name: Run Regression Tests
      run: mvn test -Dbrowser=${{ matrix.browser }} -Dgroups=regression -Dheadless=true
      continue-on-error: true

    - name: Generate Test Report
      if: always()
      run: mvn surefire-report:report

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-java${{ matrix.java-version }}-${{ matrix.browser }}
        path: |
          target/surefire-reports/
          test-output/
          target/site/

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots-java${{ matrix.java-version }}-${{ matrix.browser }}
        path: test-output/ExtentReports/screenshots/

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (Java ${{ matrix.java-version }} - ${{ matrix.browser }})
        path: target/surefire-reports/*.xml
        reporter: java-junit

  cross-browser:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: Install browsers
      run: |
        # Install Chrome
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        # Install Firefox
        sudo apt-get install -y firefox

    - name: Run Cross-Browser Tests
      run: mvn test -Dtest=CrossBrowserTest -Dheadless=true

    - name: Upload Cross-Browser Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cross-browser-results
        path: |
          target/surefire-reports/
          test-output/

  performance:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Run Performance Tests
      run: |
        # Add performance testing parameters
        mvn test -Dbrowser=chrome -Dheadless=true -Dperformance=true -Dimplicit.wait=5
      continue-on-error: true

    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: test-output/

  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Snyk Security Scan
      uses: snyk/actions/maven@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true

    - name: Upload Snyk Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: snyk-results
        path: snyk-results.sarif

  notify:
    runs-on: ubuntu-latest
    needs: [test, cross-browser]
    if: always() && github.event_name == 'push'

    steps:
    - name: Notify Success
      if: needs.test.result == 'success' && needs.cross-browser.result == 'success'
      run: |
        echo "✅ All tests passed successfully!"
        echo "Build completed for commit ${{ github.sha }}"

    - name: Notify Failure
      if: needs.test.result == 'failure' || needs.cross-browser.result == 'failure'
      run: |
        echo "❌ Some tests failed!"
        echo "Please check the test results and fix the issues."
        exit 1